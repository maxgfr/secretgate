# secretgate IS a secrets-detection engine, so its rule database and test
# fixtures legitimately contain secret-shaped example strings — GitHub secret
# scanning must not alert on them. None are real credentials:
#   - rules/**                  : the vendored gitleaks rule database (MIT), whose
#                                 allowlists list fake example keys to NOT match.
#   - src/engine/rules.gen.ts   : those rules generated into TypeScript.
#   - tests/**                  : fake, concatenation-built fixture secrets.
paths-ignore:
  - "rules/**"
  - "src/engine/rules.gen.ts"
  - "tests/**"
