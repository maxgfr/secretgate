name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build is reproducible (committed bundles + generated rules up to date)
        run: pnpm run check:build

      - name: Test (with coverage)
        run: pnpm run test:coverage

      - name: Smoke-run the committed bundle (offline, fake token via concat)
        run: pnpm run demo # asserts scan exits 1 on the fake token

  # The engine's rules are converted from gitleaks.toml (Go regex -> JS regex).
  # This job installs the REAL gitleaks binary and asserts both engines agree on
  # the fake-token fixtures — a machine check on regex-conversion fidelity.
  differential-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Differential test (JS engine vs real gitleaks on fixtures)
        run: SECRETGATE_DIFFERENTIAL=1 pnpm exec vitest run tests/engine/differential.test.ts

  # Self-scan dogfood: the repo must not contain anything the engine flags.
  # Forces test fixtures to build fake tokens by concatenation and keeps
  # GitHub push protection quiet.
  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: secretgate scans its own repo -> 0 findings
        run: node scripts/secretgate.mjs scan . --exclude rules/gitleaks.toml

  # The shipped bundles declare engines.node >=18.17 and must run with NO
  # install on that floor. This job runs ONLY the committed bundles there.
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 18 floor, install-free bundle)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: scan / pipe / hook on the floor Node
        run: |
          printf 'aws key AKIA%s ok' IOSFODNN7EXAMPLE | node scripts/secretgate.mjs scan - --json && { echo "expected exit 1 on a finding"; exit 1; } || test $? -eq 1
          printf 'no secrets here' | node scripts/secretgate.mjs scan -
          printf 'token ghp_%s end' aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa | SECRETGATE_HOME="$RUNNER_TEMP/sg" node scripts/secretgate.mjs pipe | grep -q SECRETGATE_
          node scripts/secretgate-opencode.mjs 2>/dev/null || true # plugin module must at least parse on the floor
          node -e "import('./scripts/secretgate-opencode.mjs').then(m => { if (typeof m.SecretgatePlugin !== 'function') { console.error('plugin export missing'); process.exit(1); } })"
