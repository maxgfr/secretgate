name: Release

# Conventional-Commit-driven releases, fully in CI. On every push to `main`,
# semantic-release inspects the commits since the last release and, when they
# warrant one (feat -> minor, fix -> patch, `!`/BREAKING -> major):
#   - runs the full gate (typecheck / lint / test / reproducible bundles),
#   - computes the next version and syncs it across package.json / src/version.ts /
#     SKILL.md / CHANGELOG.md and rebuilds the bundles (scripts/sync-version.mjs),
#   - publishes to npm (`npx secretgate` needs the registry; requires NPM_TOKEN),
#   - commits the bump back to `main` as `chore(release): <v> [skip ci]`,
#   - tags `v<version>` and creates the GitHub release with auto notes + tarball.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate — typecheck / lint / test / reproducible bundles
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm test
          pnpm run check:build

      - name: Release (semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
